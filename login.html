<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYBE 登入</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/mycss1.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.6),
                    rgba(0, 0, 0, 0.6)),
                url("images/HYBE.jpeg") center center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
        }

        .form-control {
            height: 48px;
            border-radius: 12px;
        }

        .btn-login {
            background: #111;
            color: white;
            height: 48px;
            border-radius: 12px;
        }

        .btn-login:hover {
            background: #6c63ff;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
        }

        .back-home:hover {
            color: #6c63ff;
        }

        .extra-links a {
            font-size: 14px;
            text-decoration: none;
            color: #555;
        }

        .extra-links a:hover {
            color: #6c63ff;
        }
    </style>

</head>

<body>
    <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> 回首頁
    </a>

    <div class="login-box animate__animated animate__fadeInDown">

        <div class="text-center mb-4">
            <i class="fa-solid fa-music fa-3x"></i>
            <h2 class="mt-2">HYBE 登入</h2>
        </div>

        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">帳號</label>
                <input type="text" id="username" class="form-control" placeholder="請輸入帳號" required>
            </div>

            <div class="mb-3">
                <label class="form-label">密碼</label>
                <input type="password" id="password" class="form-control" placeholder="請輸入密碼" required>
            </div>

            <button type="submit" class="btn btn-login w-100">
                登入
            </button>

        </form>

        <div class="extra-links d-flex justify-content-between mt-3">
            <a href="#">忘記密碼？</a>
            <a href="register.html">立即註冊</a>
        </div>
        
        <div id="msg" class="text-center mt-3"></div>

    </div>


    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();
            let msg = document.getElementById("msg");

            let data = localStorage.getItem("user_" + username);

            if (!data) {
                msg.innerHTML = "<span style='color:red'>查無此帳號</span>";
                return;
            }

            let user = JSON.parse(data);

            if (user.password === password) {
                localStorage.setItem("username", user.username);
                localStorage.setItem("nickname", user.nickname);

                msg.innerHTML = "<span style='color:green'>登入成功</span>";

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);

            } else {
                msg.innerHTML = "<span style='color:red'>密碼錯誤</span>";
            }
        });
    </script>

</body>

</html>
