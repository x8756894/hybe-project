<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVENTEEN 商品頁</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/mycss1.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background: #f5f7fb;
        }

        section {
            padding: 80px 0;
        }

        .card {
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
        }

        .card img {
            height: 220px;
            object-fit: contain;
            background: #fff;
            padding: 15px;
        }

        .price {
            color: #2ecc71;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

        <a class="navbar-brand" href="#">
            💎 SEVENTEEN SHOP
        </a>

        <div class="ms-auto position-relative">
            <a href="cart.html" class="btn btn-outline-light position-relative">
                <i class="fa-solid fa-cart-arrow-down me-1"></i> 購物車

                <span id="cart-count"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0
                </span>
            </a>
        </div>

    </nav>

    <script src="js/sweetalert2@11.js"></script>

    <script src="js/app.js"></script>
