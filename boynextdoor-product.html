<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>BOYNEXTDOOR SHOP</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/mycss1.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background: #f4f6f9;
        }

        #cart-count {
            font-size: 12px;
        }

        section {
            padding: 80px 0;
        }

        .card {
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
        }

        .card img {
            height: 220px;
            object-fit: contain;
            background: #fff;
            padding: 15px;
        }

        .price {
            color: #ff7a00;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0

            </a>
        </div>

    </nav>

                                加入購物車
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/bnd2.jpg">
                        <div class="card-body">
                            <h5>WHY.. 專輯</h5>
                            <p class="price">$1180</p>
                            <button class="btn btn-primary" onclick="buy('bnd_002')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('bnd_002','BOYNEXTDOOR','WHY.. 專輯',1180)">
                                加入購物車
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/bnd3.jpg">
                        <div class="card-body">
                            <h5>HOW? 專輯</h5>
                            <p class="price">$1200</p>
                            <button class="btn btn-primary" onclick="buy('bnd_003')">立即購買</button>
                            <button class="btn btn-outline-secondary"

                                加入購物車
                            </button>

                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/bnd4.png">
                        <div class="card-body">
                            <h5>官方手燈</h5>
                            <p class="price">$1450</p>
                            <button class="btn btn-primary" onclick="buy('bnd_004')">立即購買</button>

                <div class="col-md-4">

    </section>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/app.js"></script>

    <script>
        function buy(id) {

            const product = products.find(p => p.id === id);

            if (!product) return;

            addToCart(
                product.id,
                product.group,
                product.name,
                product.price
            );

            window.location.href = "cart.html";
        }

        function updateCartCount() {

            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let count = 0;

            cart.forEach(item => {
                count += item.qty;
            });

            let badge = document.getElementById("cart-count");
            if (badge) {
                badge.innerText = count;
            }
        }

        updateCartCount();
    </script>

</body>

</html>
