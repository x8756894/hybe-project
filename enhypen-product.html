<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENHYPEN 商品頁</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/mycss1.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background: #f4f6f9;
        }

        section {
            padding: 80px 0;
        }

        .card {
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
        }

        .card img {
            height: 220px;
            object-fit: contain;
            background: #fff;
            padding: 15px;
        }

        .price {
            color: #ff2f6d;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <section class="text-center">
        <div class="container">

            <h2>🖤 ENHYPEN 官方周邊商品</h2>
            <p>DARK BLOOD / ORANGE BLOOD 系列收藏</p>

            <div class="row g-4 mt-4">
                <div class="col-md-4">
                    <div class="card">
                        <img src="images/dark_blood.jpg">
                        <div class="card-body">
                            <h5>ENHYPEN - DARK BLOOD 專輯（ENGENE VER.）</h5>
                            <p class="price">$1180</p>
                            <button class="btn btn-primary" onclick="buy('enh_001')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('enh_001','ENHYPEN','DARK BLOOD 專輯（ENGENE VER.）',1180)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/enhypen_lightstick.jpg">
                        <div class="card-body">
                            <h5>ENHYPEN 官方手燈 Ver.2</h5>
                            <p class="price">$1500</p>
                            <button class="btn btn-primary" onclick="buy('enh_002')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('enh_002','ENHYPEN','ENHYPEN 官方手燈 Ver.2',1500)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/enhypen_photocard.jpg">
                        <div class="card-body">
                            <h5>ENHYPEN ORANGE BLOOD 小卡收藏組</h5>
                            <p class="price">$500</p>
                            <button class="btn btn-primary" onclick="buy('enh_003')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('enh_003','ENHYPEN','ORANGE BLOOD 小卡收藏組',500)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/enhypen_hoodie_dark.png">
                        <div class="card-body">
                            <h5>DARK BLOOD 官方帽T</h5>
                            <p class="price">$1780</p>
                            <button class="btn btn-primary" onclick="buy('enh_004')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('enh_004','ENHYPEN','DARK BLOOD 官方帽T',1780)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/enhypen_poster_concept.jpg">
                        <div class="card-body">
                            <h5>ENHYPEN CONCEPT PHOTO 海報組</h5>
                            <p class="price">$580</p>
                            <button class="btn btn-primary" onclick="buy('enh_005')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('enh_005','ENHYPEN','CONCEPT PHOTO 海報組',580)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/enhypen_set_deluxe.webp">
                        <div class="card-body">
                            <h5>ENHYPEN DELUXE 限定收藏套組</h5>
                            <p class="price">$2700</p>
                            <button class="btn btn-primary" onclick="buy('enh_006')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('enh_006','ENHYPEN','DELUXE 限定收藏套組',2700)">加入購物車</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
