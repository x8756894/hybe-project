<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物車</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/mycss1.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .cart-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
        }

        .cart-title {
            font-size: 32px;
            font-weight: bold;
            color: #6c63ff;
        }

        .table img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
        }

        .total-box {
            font-size: 28px;
            font-weight: bold;
            color: #6c63ff;
        }

        .empty-cart {
            text-align: center;
            padding: 80px 0;
            color: #999;
        }

        .checkout-btn {
            padding: 12px 40px;
            font-size: 20px;
            border-radius: 50px;
        }
    </style>
</head>

<body>
    <div class="container py-5">

        <div class="cart-box">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="cart-title">
                    <i class="fa-solid fa-cart-arrow-down me-2"></i> 我的購物車
                </div>

                <button class="btn btn-danger" onclick="clearCart()">
                    清空購物車
                </button>
            </div>

            <div id="cart-area"></div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        renderCart();

        function goToProducts() {
            window.location.href = "hybe-merch.html";
        }

        function renderCart() {

            const cartArea = document.getElementById("cart-area");

            if (cart.length === 0) {

                cartArea.innerHTML = `
                
                    <div class="empty-cart">
                        <h2>購物車是空的</h2>
                        <p class="mt-3">快去選購你喜歡的商品吧！</p>
                       <button class="btn btn-outline-primary btn-lg mt-4"
                        onclick="goToProducts()">
                        <i class="fa-solid fa-basket-shopping me-2"></i>
                        去逛周邊商品
                        </button>
                    </div>

                `;

                return;
            }

            let html = `
            
                <div class="table-responsive">

                    <table class="table align-middle table-hover text-center">

                        <thead class="table-dark">

                            <tr>
                                <th>商品</th>
                                <th>團體</th>
                                <th>價格</th>
                                <th>數量</th>
                                <th>小計</th>
                                <th>操作</th>
                            </tr>

                        </thead>

                        <tbody>

            `;

            let total = 0;

            cart.forEach((item, index) => {

                let subtotal = item.price * item.qty;

                total += subtotal;

                html += `
                
                    <tr>

                        <td class="fw-bold">
                            ${item.name}
                        </td>

                        <td>
                            ${item.group}
                        </td>

                        <td>
                            NT$ ${item.price}
                        </td>

                        <td>

                            <button class="btn btn-outline-secondary qty-btn"
                                onclick="decreaseQty(${index})">
                                -
                            </button>

                            <span class="mx-3 fw-bold">
                                ${item.qty}
                            </span>

                            <button class="btn btn-outline-secondary qty-btn"
                                onclick="increaseQty(${index})">
                                +
                            </button>

                        </td>

                        <td class="fw-bold text-primary">
                            NT$ ${subtotal}
                        </td>

                        <td>

                            <button class="btn btn-danger"
                                onclick="removeItem(${index})">

                                刪除

                            </button>

                        </td>

                    </tr>
                
                `;
            });

            html += `
            
                        </tbody>

                    </table>

                </div>

                <div class="d-flex justify-content-between align-items-center mt-4">

                    <div class="total-box">
                        總金額：NT$ ${total}
                    </div>

                    <button class="btn btn-success checkout-btn"
                        onclick="checkout()">

                        結帳

                    </button>

                </div>
            
            `;

            cartArea.innerHTML = html;
        }

        function saveCart() {
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function increaseQty(index) {

            cart[index].qty++;

            saveCart();

            renderCart();
        }

        function decreaseQty(index) {

            if (cart[index].qty > 1) {

                cart[index].qty--;

            } else {

                cart.splice(index, 1);
            }

            saveCart();

            renderCart();
        }

        function removeItem(index) {

            Swal.fire({
                title: '確定刪除？',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: '刪除',
                cancelButtonText: '取消'
            }).then((result) => {

                if (result.isConfirmed) {

                    cart.splice(index, 1);

                    saveCart();

                    renderCart();

                    Swal.fire({
                        icon: 'success',
                        title: '已刪除',
                        timer: 1000,
                        showConfirmButton: false
                    });
                }
            });
        }

        function clearCart() {

            Swal.fire({
                title: '確定清空購物車？',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: '清空',
                cancelButtonText: '取消'
            }).then((result) => {

                if (result.isConfirmed) {

                    cart = [];

                    saveCart();

                    renderCart();

                    Swal.fire({
                        icon: 'success',
                        title: '購物車已清空',
                        timer: 1200,
                        showConfirmButton: false
                    });
                }
            });
        }

        function checkout() {

            Swal.fire({
                icon: 'success',
                title: '結帳成功 💜',
                text: '感謝您的購買！'
            });

            cart = [];

            saveCart();

            renderCart();
        }


    </script>

</body>

</html>
