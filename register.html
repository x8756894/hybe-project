<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊帳號</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/mycss1.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .box {
            max-width: 450px;
            margin: 80px auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <div class="box">

        <h3 class="text-center mb-4">會員註冊</h3>

        <div class="mb-3">
            <label>暱稱</label>
            <input type="text" class="form-control" id="nickname">
        </div>

        <div class="mb-3">
            <label>帳號 (1~6字)</label>
            <input type="text" class="form-control" id="username">
        </div>

        <div class="mb-3">
            <label>密碼 (2~8字)</label>
            <input type="password" class="form-control" id="password">
        </div>

        <div class="mb-3">
            <label>Email (2~10字)</label>
            <input type="text" class="form-control" id="email">
        </div>

        <button class="btn btn-dark w-100" id="btnRegister">
            註冊
        </button>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>

    <script>
        $(function () {

            $("#btnRegister").click(function () {
                let nickname = $("#nickname").val();
                let username = $("#username").val();
                let password = $("#password").val();
                let email = $("#email").val();

                if (!nickname || !username || !password || !email) {
                    Swal.fire("請填寫完整資料", "", "error");
                    return;
                }

                if (username.length < 1 || username.length > 6) {
                    Swal.fire("帳號錯誤", "1~6字", "error");
                    return;
                }

                if (password.length < 2 || password.length > 8) {
                    Swal.fire("密碼錯誤", "2~8字", "error");
                    return;
                }

                if (email.length < 2 || email.length > 10) {
                    Swal.fire("Email錯誤", "2~10字", "error");
                    return;
                }

                for (let i = 0; i < localStorage.length; i++) {

                    let key = localStorage.key(i);

                    if (key.startsWith("user_")) {

                        let user = JSON.parse(localStorage.getItem(key));

                        if (!user) continue;

                        if (user.nickname === nickname) {
                            Swal.fire("暱稱已被使用", "請換一個", "warning");
                            return;
                        }

                        if (user.username === username) {
                            Swal.fire("帳號已被使用", "請換一個", "warning");
                            return;
                        }
                    }
                }

                let user = {
                    nickname: nickname,
                    username: username,
                    password: password,
                    email: email,
                };

                localStorage.setItem("user_" + username, JSON.stringify(user));

                localStorage.setItem("username", username);
                localStorage.setItem("nickname", nickname);

                Swal.fire({
                    icon: 'success',
                    title: '註冊成功',
                    text: '即將進入首頁',
                    timer: 1200,
                    showConfirmButton: false
                });

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1200);

            });

        });
    </script>

</body>

</html>
