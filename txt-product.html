<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT 商品頁</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/mycss1.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background: #f3f6ff;
        }

        section {
            padding: 80px 0;
        }

        .card {
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.12);
        }

        .card img {
            height: 220px;
            object-fit: contain;
            background: #fff;
            padding: 15px;
        }

        .price {
            color: #3b82f6;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

        <a class="navbar-brand" href="#">
            🌙 TXT SHOP
        </a>

        <div class="ms-auto position-relative">
            <a href="cart.html" class="btn btn-outline-light position-relative">
                <i class="fa-solid fa-cart-arrow-down me-1"></i> 購物車

                <span id="cart-count"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0
                </span>
            </a>
        </div>

    </nav>

    <section class="text-center">
        <div class="container">

            <h2>🌙 TXT 官方周邊商品</h2>
            <p>The Name Chapter / Freefall / DREAM WORLD 收藏系列</p>

            <div class="row g-4 mt-4">
                <div class="col-md-4">
                    <div class="card">
                        <img src="images/txt_freefall_album.jpg">
                        <div class="card-body">
                            <h5>The Name Chapter: FREEFALL 專輯</h5>
                            <p class="price">$1180</p>
                            <button class="btn btn-primary" onclick="buy('txt_001')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('txt_001','TXT','The Name Chapter: FREEFALL 專輯',1180)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/txt_lightstick.avif">
                        <div class="card-body">
                            <h5>TXT 官方手燈 Ver.2</h5>
                            <p class="price">$1500</p>
                            <button class="btn btn-primary" onclick="buy('txt_002')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('txt_002','TXT','TXT 官方手燈 Ver.2',1500)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/txt_photocard_dream.jpg">
                        <div class="card-body">
                            <h5>DREAM CHAPTER 小卡收藏包</h5>
                            <p class="price">$470</p>
                            <button class="btn btn-primary" onclick="buy('txt_003')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('txt_003','TXT','DREAM CHAPTER 小卡收藏包',470)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/txt_hoodie_mirage.jpeg">
                        <div class="card-body">
                            <h5>ACT: SWEET MIRAGE 官方帽T</h5>
                            <p class="price">$1750</p>
                            <button class="btn btn-primary" onclick="buy('txt_004')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('txt_004','TXT','ACT: SWEET MIRAGE 官方帽T',1750)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/txt_poster_concept.jpg">
                        <div class="card-body">
                            <h5>CONCEPT PHOTO 海報組</h5>
                            <p class="price">$580</p>
                            <button class="btn btn-primary" onclick="buy('txt_005')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('txt_005','TXT','CONCEPT PHOTO 海報組',580)">加入購物車</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="images/txt_set_deluxe.jpeg">
                        <div class="card-body">
                            <h5>DELUXE DREAM BOX 套組</h5>
                            <p class="price">$2750</p>
                            <button class="btn btn-primary" onclick="buy('txt_006')">立即購買</button>
                            <button class="btn btn-outline-secondary"
                                onclick="addToCart('txt_006','TXT','DELUXE DREAM BOX 套組',2750)">加入購物車</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
